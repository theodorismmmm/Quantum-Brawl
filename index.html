<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Brawl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: "Syne", sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      padding: 4rem 1.25rem 2.5rem;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 720px;
      animation: reveal 900ms ease-out both;
    }

    h1 {
      font-size: clamp(2.3rem, 7vw, 5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    p {
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      color: #d9d9d9;
    }

    .cta {
      display: inline-block;
      text-decoration: none;
      color: #000;
      background: #fff;
      border: 2px solid #fff;
      padding: 0.9rem 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 220ms ease;
    }

    .cta:hover {
      background: #000;
      color: #fff;
      transform: translateY(-2px);
    }

    .bottom {
      margin-top: 3rem;
      font-size: clamp(1.35rem, 4vw, 2.9rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.2;
      animation: glow 2.4s ease-in-out infinite alternate;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      from {
        opacity: 0.82;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Quantum Brawl</h1>
    <p>The best Brawlstars mod forever</p>
    <a class="cta" href="https://discord.gg/S9wANrWSVq" target="_blank" rel="noopener noreferrer">Join Today</a>
  </main>

  <footer class="bottom">Quantum Brawl+ only 25€/Permament</footer>
</body>
</html>
